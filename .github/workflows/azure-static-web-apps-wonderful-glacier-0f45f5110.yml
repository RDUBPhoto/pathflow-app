name: Azure Static Web Apps CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

concurrency:
  group: swa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    env:
      SWA_DEPLOY_TOKEN_PRIMARY: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_GLACIER_0F45F5110 }}
      SWA_DEPLOY_TOKEN_FALLBACK: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve SWA Deploy Token
        run: |
          if [ -n "${SWA_DEPLOY_TOKEN_PRIMARY}" ]; then
            echo "SWA_DEPLOY_TOKEN=${SWA_DEPLOY_TOKEN_PRIMARY}" >> "${GITHUB_ENV}"
            echo "Using resource-scoped SWA deploy token."
          elif [ -n "${SWA_DEPLOY_TOKEN_FALLBACK}" ]; then
            echo "SWA_DEPLOY_TOKEN=${SWA_DEPLOY_TOKEN_FALLBACK}" >> "${GITHUB_ENV}"
            echo "Using fallback SWA deploy token."
          else
            echo "Missing SWA deploy token."
            echo "Set either AZURE_STATIC_WEB_APPS_API_TOKEN or AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_GLACIER_0F45F5110 in GitHub repo secrets."
            exit 1
          fi

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOY_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/"
          app_build_command: |
            npm ci
            npm run build
          api_location: "api"
          output_location: "dist/web/browser"
          production_branch: "main"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    env:
      SWA_DEPLOY_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_GLACIER_0F45F5110 || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOY_TOKEN }}
          action: close
