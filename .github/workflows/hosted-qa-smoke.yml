name: Hosted QA Smoke

on:
  workflow_dispatch:
  schedule:
    # Mon/Wed/Fri at 02:00 America/Chicago ~= 07:00 UTC
    - cron: '0 7 * * 1,3,5'

concurrency:
  group: hosted-qa-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hosted_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      QA_REPORT_EMAIL_TO: ${{ secrets.QA_REPORT_EMAIL_TO }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate hosted base URL
        run: |
          if [ -z "${PLAYWRIGHT_BASE_URL}" ]; then
            echo "Missing PLAYWRIGHT_BASE_URL secret."
            echo "Set PLAYWRIGHT_BASE_URL to your hosted app origin (for example https://www.pathflow-app.com)."
            exit 1
          fi

      - name: Run hosted smoke tests
        id: hosted_smoke_tests
        continue-on-error: true
        run: npm run test:e2e:hosted

      - name: Send hosted QA summary email
        if: always()
        run: node scripts/send-hosted-qa-email.mjs

      - name: Upload hosted Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-hosted-report
          path: playwright-report-hosted
          if-no-files-found: ignore

      - name: Upload hosted Playwright junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-hosted-junit
          path: test-results/playwright/hosted-junit.xml
          if-no-files-found: ignore

      - name: Fail workflow when hosted smoke tests fail
        if: steps.hosted_smoke_tests.outcome != 'success'
        run: exit 1
