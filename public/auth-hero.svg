<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1700" role="img" aria-label="Pathflow marketing background">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#263a6d"/>
      <stop offset="48%" stop-color="#1d3560"/>
      <stop offset="100%" stop-color="#10203b"/>
    </linearGradient>
    <radialGradient id="sun" cx="22%" cy="24%" r="44%">
      <stop offset="0%" stop-color="#8fd4ff" stop-opacity=".84"/>
      <stop offset="60%" stop-color="#4ca7ff" stop-opacity=".24"/>
      <stop offset="100%" stop-color="#4ca7ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mountainA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#223754"/>
      <stop offset="100%" stop-color="#15263e"/>
    </linearGradient>
    <linearGradient id="mountainB" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2d4a"/>
      <stop offset="100%" stop-color="#0f1e34"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b6cff" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#4cd4ff" stop-opacity=".1"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1400" height="1700" fill="url(#sky)"/>
  <rect width="1400" height="1700" fill="url(#sun)"/>

  <ellipse cx="300" cy="380" rx="280" ry="190" fill="#76d0ff" opacity=".24" filter="url(#blur)"/>
  <ellipse cx="1120" cy="230" rx="220" ry="150" fill="#3f8bff" opacity=".2" filter="url(#blur)"/>
  <ellipse cx="760" cy="1260" rx="540" ry="310" fill="#13386e" opacity=".34" filter="url(#blur)"/>

  <path d="M0 1040 L280 700 L530 1010 L760 640 L1090 1080 L1400 860 L1400 1700 L0 1700 Z" fill="url(#mountainA)"/>
  <path d="M0 1240 L250 980 L490 1230 L760 920 L1020 1290 L1400 1030 L1400 1700 L0 1700 Z" fill="url(#mountainB)"/>
  <path d="M0 1370 L220 1160 L470 1380 L780 1130 L1030 1410 L1400 1200 L1400 1700 L0 1700 Z" fill="#0d1b2f"/>

  <g opacity=".4">
    <path d="M230 760 C460 700, 620 560, 860 460" stroke="#8dd1ff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M210 790 C450 730, 650 610, 900 510" stroke="#a0ddff" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <rect x="0" y="1260" width="1400" height="440" fill="url(#accent)"/>
</svg>
